<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Adivinhação</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
            text-align: center;
            width: 350px;
        }

        h1 {
            color: #333;
        }

        p {
            color: #666;
        }

        input {
            width: 80%;
            padding: 10px;
            margin-top: 15px;
            border: 2px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #mensagem {
            margin-top: 20px;
            font-weight: bold;
            color: #222;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Jogo de Adivinhação</h1>

        <p>Tente adivinhar o número entre 1 e 10</p>

        <input type="number" id="numero" placeholder="Digite um número">

        <br>

        <button onclick="verificarNumero()">
            Verificar
        </button>

        <p id="mensagem"></p>
    </div>

    <script>
        let numeroSecreto = 7;
        let tentativas = 0;

        function verificarNumero() {

            let numeroUsuario = Number(document.getElementById("numero").value);

            tentativas++;

            if (numeroUsuario === numeroSecreto) {

                document.getElementById("mensagem").innerHTML =
                    "🎉 Parabéns! Você acertou em " + tentativas + " tentativas.";

            } else {

                document.getElementById("mensagem").innerHTML =
                    "❌ Número incorreto! Tente novamente.";
            }
        }
    </script>

</body>
</html>
